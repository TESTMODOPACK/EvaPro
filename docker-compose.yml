# ══════════════════════════════════════════════════════════════════════
# Eva360 — Docker Compose para producción (Hostinger VPS)
# ══════════════════════════════════════════════════════════════════════
#
# Uso:
#   1. Copiar .env.example → .env y completar los valores
#   2. docker compose up -d --build
#   3. La app estará en http://tu-dominio (nginx reverse proxy)
#
# Servicios:
#   - db:    PostgreSQL 16 (datos persistentes en volumen)
#   - api:   NestJS API (puerto 3000 interno)
#   - web:   Next.js frontend (puerto 3001 interno)
#   - nginx: Reverse proxy (puertos 80/443)
#
# Log rotation:
#   Cada servicio tiene un `logging` block con driver json-file y
#   max-size:50m / max-file:5. Esto evita que `/var/lib/docker/containers/
#   .../*-json.log` llene el disco del VPS en semanas/meses de uptime.
#   Rotación nativa Docker, aplica al hacer `docker compose up -d`.
#
# Memoria y CPU (ajustar según el tamaño del VPS):
#   VPS 2 GB  — total reservado 1.72 GB (~86%), queda 280 MB para el host
#   VPS 4 GB  — duplicar mem_limit de api y web
#   VPS 8 GB+ — triplicar api (PDF/Excel/AI inline todavía usan heap)
#
# ══════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eva360_db
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 0.75
    environment:
      POSTGRES_DB: ${DB_NAME:-eva360}
      POSTGRES_USER: ${DB_USER:-eva360}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Debe definir DB_PASSWORD en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eva360}"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    # Log rotation — ver cabecera del archivo.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── API (NestJS) ───────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: eva360_api
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 768m
    cpus: 1.0
    # Graceful shutdown: Nest recibe SIGTERM, cierra conexiones DB y cron
    # jobs, y solo después sale. 30s es suficiente para requests en vuelo.
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-eva360}:${DB_PASSWORD}@db:5432/${DB_NAME:-eva360}?sslmode=disable
      DB_SYNC: "true"
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:?Debe definir JWT_SECRET en .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Eva360 <onboarding@resend.dev>}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${APP_URL:-http://localhost}
      # ─── Connection Pool ─────────────────────────────────────────
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      # ─── Observabilidad ───────────────────────────────────────────
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # ─── Metricas Prometheus ────────────────────────────────────
      METRICS_USER: ${METRICS_USER:-}
      METRICS_PASSWORD: ${METRICS_PASSWORD:-}
    ports:
      - "127.0.0.1:3000:3000"
    # /health/live es liveness puro — no toca DB, no pesa el event loop.
    # wget viene en busybox de node:20-alpine. start_period da tiempo al
    # seed inicial en primer deploy (~30-60s).
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    # Log rotation — ver cabecera del archivo.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Web (Next.js) ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost/api}
        # Sentry source maps (P1.4). Si estas vars no están en .env, el
        # build no falla, solo se pierde la subida de sourcemaps.
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    container_name: eva360_web
    restart: unless-stopped
    mem_limit: 384m
    memswap_limit: 384m
    cpus: 0.75
    stop_grace_period: 15s
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost/api}
    ports:
      - "127.0.0.1:3001:3001"
    # Next.js no expone /health. Usamos /login que siempre responde 200
    # sin redirect (publico, sin auth). Evita ambiguedad de --spider con
    # paginas que hacen 307 a /login en la raiz.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Log rotation — ver cabecera del archivo.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eva360_nginx
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    cpus: 0.25
    stop_grace_period: 10s
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    healthcheck:
      # nginx -t valida config y confirma que el proceso está vivo.
      # No depende de SSL certs ni redirect behavior (port 80 redirige
      # a HTTPS, haciendo fallar wget/curl contra http://localhost).
      test: ["CMD-SHELL", "nginx -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Log rotation — nginx access/error logs también se capturan por Docker.
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
