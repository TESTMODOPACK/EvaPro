# ── Eva360 — Nginx Reverse Proxy Configuration ──────────────────────
# Routes:
#   /api/*  → API (NestJS, port 3000)
#   /*      → Web (Next.js, port 3001)

upstream api {
    server api:3000;
}

upstream web {
    server web:3001;
}

# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name eva360.ascenda.cl;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name eva360.ascenda.cl;

    # SSL certificates (Hostinger Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/eva360.ascenda.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eva360.ascenda.cl/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    # API routes
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # Frontend (everything else)
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
