# ── Eva360 — Nginx Reverse Proxy Configuration ──────────────────────
# Routes:
#   /api/*  → API (NestJS, port 3000)
#   /*      → Web (Next.js, port 3001)
#
# Para HTTPS con Let's Encrypt:
#   1. docker compose up -d nginx
#   2. certbot certonly --webroot -w /var/www/certbot -d tu-dominio.cl
#   3. Descomentar el bloque server 443 y reiniciar nginx

upstream api {
    server api:3000;
}

upstream web {
    server web:3001;
}

