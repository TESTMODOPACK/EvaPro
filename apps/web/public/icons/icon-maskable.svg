<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="EVA360 by Ascenda">
  <defs>
    <linearGradient id="ascGold" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#6B4A18"/>
      <stop offset="45%" stop-color="#C9933A"/>
      <stop offset="80%" stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#F5E4A8"/>
    </linearGradient>
  </defs>

  <!-- Fondo completo: rellena todo el canvas (las máscaras recortan).
       Sin rounded corners porque el OS aplicará su propia forma. -->
  <rect width="512" height="512" fill="#08090B"/>

  <!-- Símbolo escalado ~62% del canvas para quedar DENTRO del círculo
       inscrito de safe zone 80% (radio 204.8 desde centro 256,256).
       El apex con halo debe quedar completamente dentro de ese círculo.
       Barras total ancho: 7*22 + 6*10 = 214. Centrado desde x=149.
       Alturas: de 42 a 228. -->
  <rect x="149" y="334" width="22" height="42"  rx="4" fill="url(#ascGold)" opacity="0.30"/>
  <rect x="181" y="312" width="22" height="64"  rx="4" fill="url(#ascGold)" opacity="0.45"/>
  <rect x="213" y="286" width="22" height="90"  rx="4" fill="url(#ascGold)" opacity="0.60"/>
  <rect x="245" y="256" width="22" height="120" rx="4" fill="url(#ascGold)" opacity="0.72"/>
  <rect x="277" y="220" width="22" height="156" rx="4" fill="url(#ascGold)" opacity="0.84"/>
  <rect x="309" y="182" width="22" height="194" rx="4" fill="url(#ascGold)" opacity="0.92"/>
  <rect x="341" y="148" width="22" height="228" rx="4" fill="url(#ascGold)"/>

  <!-- Apex: centro (352, 140), halo r=18 → borde en (370, 140).
       Distancia al centro 256,256: sqrt(114² + 116²) = 163 < 204.8 ✓ -->
  <circle cx="352" cy="140" r="10" fill="#F5E4A8" opacity="0.95"/>
  <circle cx="352" cy="140" r="18" fill="none" stroke="#C9933A" stroke-width="1.5" opacity="0.40"/>

  <!-- Curva sobre cimas -->
  <path d="M 160 334 C 220 280, 290 220, 352 140"
        fill="none" stroke="#C9933A" stroke-width="2.5" stroke-dasharray="7,9" opacity="0.50"/>
</svg>
