<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="EVA360 by Ascenda">
  <defs>
    <linearGradient id="ascGold" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#6B4A18"/>
      <stop offset="45%" stop-color="#C9933A"/>
      <stop offset="80%" stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#F5E4A8"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado (app icon) -->
  <rect width="512" height="512" rx="96" fill="#08090B"/>

  <!-- 7 barras doradas crecientes. Total ancho: 7*36 + 6*16 = 348, centrado desde x=82. -->
  <rect x="82"  y="376" width="36" height="72"  rx="8" fill="url(#ascGold)" opacity="0.30"/>
  <rect x="134" y="336" width="36" height="112" rx="8" fill="url(#ascGold)" opacity="0.45"/>
  <rect x="186" y="288" width="36" height="160" rx="8" fill="url(#ascGold)" opacity="0.60"/>
  <rect x="238" y="232" width="36" height="216" rx="8" fill="url(#ascGold)" opacity="0.72"/>
  <rect x="290" y="168" width="36" height="280" rx="8" fill="url(#ascGold)" opacity="0.84"/>
  <rect x="342" y="104" width="36" height="344" rx="8" fill="url(#ascGold)" opacity="0.92"/>
  <rect x="394" y="72"  width="36" height="376" rx="8" fill="url(#ascGold)"/>

  <!-- Punto luminoso en el apex (centro de la 7ma barra, sobre el top) -->
  <circle cx="412" cy="60" r="18" fill="#F5E4A8" opacity="0.95"/>
  <circle cx="412" cy="60" r="34" fill="none" stroke="#C9933A" stroke-width="2" opacity="0.40"/>

  <!-- Curva de tendencia sobre las cimas -->
  <path d="M 100 376 C 210 300, 320 200, 412 60"
        fill="none" stroke="#C9933A" stroke-width="4" stroke-dasharray="10,14" opacity="0.50"/>
</svg>
