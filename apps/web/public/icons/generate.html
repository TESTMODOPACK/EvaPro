<html><body style="margin:0"><canvas id="c"></canvas><script>[192,512].forEach(s=>{const c=document.getElementById("c");c.width=c.height=s;const x=c.getContext("2d");x.fillStyle="#1a1206";x.fillRect(0,0,s,s);x.beginPath();x.arc(s/2,s/2,s*.35,0,Math.PI*2);x.fillStyle="#C9933A";x.fill();x.fillStyle="#fff";x.font="bold "+Math.round(s*.4)+"px Arial";x.textAlign="center";x.textBaseline="middle";x.fillText("A",s/2,s/2+s*.02);const a=document.createElement("a");a.href=c.toDataURL();a.download="icon-"+s+".png";a.click();});</script></body></html>
