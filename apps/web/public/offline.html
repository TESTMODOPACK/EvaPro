<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascenda Performance — Sin conexión</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1206; color: #f5e4a8;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.5rem; color: #C9933A; }
    p { color: #a89060; font-size: 0.9rem; line-height: 1.6; margin: 0 0 1.5rem; }
    button {
      background: #C9933A; color: #fff; border: none; padding: 12px 24px;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #b8860b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet. Verifica tu conexión y vuelve a intentarlo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
