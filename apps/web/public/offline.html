<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — EVA360</title>
  <link rel="icon" href="/icons/favicon-32.png">
  <style>
    :root {
      --gold: #C9933A;
      --gold-light: #E8C97A;
      --gold-lighter: #F5E4A8;
      --gold-dark: #6B4A18;
      --bg: #08090B;
      --text: #f5e4a8;
      --text-muted: #a89060;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid rgba(201, 147, 58, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      color: var(--gold);
    }
    p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 0 0 1.5rem;
    }
    button {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: #1a1206;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.08); }
    button:active { filter: brightness(0.95); }
    .brand {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <img src="/icons/icon-192.png" alt="EVA360" width="64" height="64" />
    </div>
    <h1>Sin conexión</h1>
    <p>No pudimos cargar esta página. Verifica tu conexión a internet y vuelve a intentarlo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
    <div class="brand">EVA360 · Ascenda</div>
  </div>
</body>
</html>
