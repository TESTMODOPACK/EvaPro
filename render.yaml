services:
  - type: web
    name: ascenda-api
    env: node
    # pnpm install without --prod so that devDependencies (nest CLI) are available during build
    buildCommand: pnpm install && pnpm run db:migrate:prod && pnpm run db:seed && npx turbo run build --filter=@repo/api
    startCommand: node apps/api/dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ascenda-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ascenda-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://ascenda-performance.netlify.app

  - type: redis
    name: ascenda-redis
    ipAllowList: []

databases:
  - name: ascenda-db
    databaseName: ascenda_perf
    user: ascenda
    plan: starter
