services:
  - type: web
    name: ascenda-api
    env: node
    # pnpm install without --prod so that devDependencies (nest CLI) are available during build.
    # NOTA: los seeds YA NO corren en el buildCommand. En cada deploy, seed.js
    # pisaba silenciosamente los cambios del demo tenant (plan, addon IA).
    # Si necesitas bootstrapear un entorno nuevo, correr manualmente via Render Shell:
    #   node apps/api/dist/database/seed.js && node apps/api/dist/database/seed-demo-full.js
    buildCommand: pnpm install && npx turbo run build --filter=@repo/api
    startCommand: node apps/api/dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ascenda-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ascenda-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://evaascenda.netlify.app
      # ─── Observabilidad ────────────────────────────────────────────
      # SENTRY_DSN: configurar en Render dashboard (valor sensible, no va al yaml).
      # Si no esta definido, Sentry queda inactivo silenciosamente.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      # Render expone el SHA del commit en RENDER_GIT_COMMIT. instrument.ts
      # lo usa como fallback si SENTRY_RELEASE no esta explicitamente seteado.
      # Sampling de traces: 10% en prod es suficiente para ver p95/p99.
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.1"
      # LOG_LEVEL: controla verbosidad de pino. `info` en prod, `debug` en dev.
      - key: LOG_LEVEL
        value: info

  - type: redis
    name: ascenda-redis
    ipAllowList: []

databases:
  - name: ascenda-db
    databaseName: ascenda_perf
    user: ascenda
    plan: starter
