services:
  - type: web
    name: ascenda-api
    env: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm build --filter api
    startCommand: cd apps/api && pnpm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ascenda-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ascenda-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: redis
    name: ascenda-redis
    ipAllowList: []

databases:
  - name: ascenda-db
    databaseName: ascenda_perf
    user: ascenda
    plan: starter
